name: iac_login_app  # Replace with your actual app name
description: A login application for IAC.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
# Remove this line if you wish to publish to pub.dev

# The version follows semantic versioning (https://semver.org/)
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"  # Adjust SDK constraints as needed

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.70.2  # Use the latest version available
  cupertino_icons: ^1.0.2  # The following adds the Cupertino Icons font to your application.
  qr_flutter: ^4.1.0
  printing: ^5.6.0  # Check for the latest version on pub.dev

  http: ^1.2.2 #api call
  connectivity_plus: ^6.1.0 #check user is online or not
  internet_connection_checker: ^1.0.0+1
  device_info_plus: ^10.1.2
  get: ^4.6.6 #getx obs obx api handler with state management
  permission_handler: ^11.3.1 #camera contact permssion handler
  intl: ^0.19.0
  shared_preferences: ^2.3.1 #user defaults
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  image_picker: ^1.1.2
  youtube_player_flutter: ^9.1.1
  url_launcher: ^6.3.0 #launch calling screen from app
 # qr_flutter: ^4.1.0 #qr code generation for given string data
  auto_size_text: ^3.0.0
  html: ^0.15.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0  # The "flutter_lints" package below contains a set of recommended lints to encourage good coding practices.
  flutter_launcher_icons: ^0.14.2
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"


# For information on the generic Dart part of this file, see the following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true  # The following line ensures that the Material Icons font is included with your application.

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/forest_aerial.jpg
    - assets/iac-Logo.png 
    - assets/Logo.png
    - assets/icon.png
    
     # Ensure this path is correct and the file exists
    # Add any other images you have in your assets folder
    # - assets/other_images/

  # For details regarding adding assets from package dependencies, see https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here, in this "flutter" section.
  # For details regarding fonts from package dependencies, see https://flutter.dev/custom-fonts/#from-packages